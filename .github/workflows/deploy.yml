name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-production:
    name: Deploy to Production (samurai-hub.com)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VPS (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/client-management-app
            git fetch origin main
            git reset --hard origin/main
            venv/bin/pip install -r requirements.txt -q
            supervisorctl restart samurai-hub
            sleep 3
            # Restart e-contract service (port 5001) – kill by port to avoid self-match
            fuser -k 5001/tcp 2>/dev/null || true
            sleep 1
            nohup venv/bin/python -m e_contract_service.app \
              >> /var/log/econtract-app.log 2>&1 &
            disown
            supervisorctl status samurai-hub

  deploy-staging:
    name: Deploy to Staging (dev.samurai-hub.com)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to VPS (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/client-management-app
            git fetch origin develop
            git reset --hard origin/develop
            venv/bin/pip install -r requirements.txt -q
            supervisorctl restart samurai-hub
            sleep 3
            # Restart e-contract service (port 5001) – kill by port to avoid self-match
            fuser -k 5001/tcp 2>/dev/null || true
            sleep 1
            nohup venv/bin/python -m e_contract_service.app \
              >> /var/log/econtract-app.log 2>&1 &
            disown
            supervisorctl status samurai-hub
