name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-production:
    name: Deploy to Production (samurai-hub.com)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VPS (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/client-management-app
            git fetch origin main
            git reset --hard origin/main
            venv/bin/pip install -r requirements.txt -q
            # Install e-contract supervisor config if not yet present
            if [ ! -f /etc/supervisor/conf.d/econtract.conf ]; then
              sudo cp deploy/supervisor/econtract.conf /etc/supervisor/conf.d/
              sudo supervisorctl reread
              sudo supervisorctl update
            fi
            supervisorctl restart samurai-hub
            supervisorctl restart samurai-hub-econtract || supervisorctl start samurai-hub-econtract
            sleep 3
            supervisorctl status samurai-hub samurai-hub-econtract

  deploy-staging:
    name: Deploy to Staging (dev.samurai-hub.com)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to VPS (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/client-management-app
            git fetch origin develop
            git reset --hard origin/develop
            venv/bin/pip install -r requirements.txt -q
            # Install e-contract supervisor config if not yet present
            if [ ! -f /etc/supervisor/conf.d/econtract.conf ]; then
              sudo cp deploy/supervisor/econtract.conf /etc/supervisor/conf.d/
              sudo supervisorctl reread
              sudo supervisorctl update
            fi
            supervisorctl restart samurai-hub
            supervisorctl restart samurai-hub-econtract || supervisorctl start samurai-hub-econtract
            sleep 3
            supervisorctl status samurai-hub samurai-hub-econtract
