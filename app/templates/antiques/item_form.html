{% extends 'antiques/base.html' %}
{% block title %}{{ '商品編集' if item else '商品登録' }}{% endblock %}
{% block topbar_title %}{{ '商品編集' if item else '商品登録' }}{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1>{{ '商品編集' if item else '商品登録' }}</h1>
  </div>
  <a href="{{ url_for('antiques.items') }}" class="btn btn-ghost">← 一覧に戻る</a>
</div>
<div class="divider"></div>
<div class="card" style="max-width:760px">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ get_csrf() }}">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">管理番号</label>
        <input class="form-control" type="text" name="management_no" value="{{ item.management_no if item else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">品名 *</label>
        <input class="form-control" type="text" name="name" required value="{{ item.name if item else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">分類</label>
        <select class="form-control" name="category">
          <option value="">— 選択 —</option>
          {% for c in category_list %}
          <option value="{{ c }}" {% if item and item.category == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">時代・年代</label>
        <input class="form-control" type="text" name="era" placeholder="例: 江戸時代後期" value="{{ item.era if item else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">状態</label>
        <select class="form-control" name="condition">
          {% for c in condition_list %}
          <option value="{{ c }}" {% if item and item.condition == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス *</label>
        <select class="form-control" name="status">
          {% for s in status_list %}
          <option value="{{ s }}" {% if item and item.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">仕入先</label>
        <select class="form-control" name="supplier_id">
          <option value="">— 選択 —</option>
          {% for s in suppliers %}
          <option value="{{ s.id }}" {% if item and item.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">仕入価格（円）</label>
        <input class="form-control" type="number" name="acquisition_cost" step="1" value="{{ item.acquisition_cost if item else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">販売希望価格（円）</label>
        <input class="form-control" type="number" name="asking_price" step="1" value="{{ item.asking_price if item else '' }}">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">説明・来歴</label>
        <textarea class="form-control" name="description" rows="4">{{ item.description if item else '' }}</textarea>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
      <button type="submit" class="btn btn-primary">{{ '更新する' if item else '登録する' }}</button>
      <a href="{{ url_for('antiques.items') }}" class="btn btn-ghost">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
