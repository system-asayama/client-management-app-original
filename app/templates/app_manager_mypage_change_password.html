{% extends "base.html" %}
{% block title %}パスワード変更 - アプリ管理者{% endblock %}
{% block content %}
<h1>パスワード変更</h1>

<div style="margin-bottom:20px">
  <a class="btn sub" href="{{ url_for('app_manager.mypage') }}">マイページに戻る</a>
</div>

<div style="max-width:600px;background:#fff;padding:30px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
  <form method="post" style="display:flex;flex-direction:column;gap:20px">
    <div>
      <label for="current_password" style="display:block;margin-bottom:8px;font-weight:bold">現在のパスワード <span style="color:red">*</span></label>
      <input 
        type="password" 
        id="current_password" 
        name="current_password" 
        required
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px">
    </div>
    
    <div>
      <label for="new_password" style="display:block;margin-bottom:8px;font-weight:bold">新しいパスワード <span style="color:red">*</span></label>
      <input 
        type="password" 
        id="new_password" 
        name="new_password" 
        required
        minlength="8"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px">
      <small style="color:#666">8文字以上で入力してください</small>
    </div>
    
    <div>
      <label for="confirm_password" style="display:block;margin-bottom:8px;font-weight:bold">新しいパスワード（確認） <span style="color:red">*</span></label>
      <input 
        type="password" 
        id="confirm_password" 
        name="confirm_password" 
        required
        minlength="8"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px">
    </div>
    
    <div style="display:flex;gap:10px;margin-top:10px">
      <button type="submit" class="btn">変更する</button>
      <a href="{{ url_for('app_manager.mypage') }}" class="btn" style="background:#999">キャンセル</a>
    </div>
  </form>
</div>

<script>
  // パスワード一致確認
  document.querySelector('form').addEventListener('submit', function(e) {
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    
    if (newPass !== confirmPass) {
      e.preventDefault();
      alert('新しいパスワードが一致しません');
    }
  });
</script>
{% endblock %}
