{% extends 'breeder/base.html' %}
{% block title %}ヒート登録{% endblock %}
{% block topbar_title %}ヒート登録{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">ヒートを登録</div>
  <a href="{{ url_for('breeder.heats_list') }}" class="btn btn-secondary btn-sm">← 一覧に戻る</a>
</div>
<div class="card" style="max-width:600px;">
  <form method="post">
    <div class="form-grid form-grid-2">
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">犬 *</label>
        <select name="dog_id" class="form-control" required>
          <option value="">選択してください</option>
          {% for dog in dogs %}
          <option value="{{ dog.id }}">{{ dog.name }} ({{ dog.breed }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">開始日</label>
        <input type="date" name="start_date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">最終確認日</label>
        <input type="date" name="last_confirmed_date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">次回予定日</label>
        <input type="date" name="next_predicted_date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select name="status" class="form-control">
          <option value="active">発情中</option>
          <option value="imminent">間近</option>
          <option value="completed">完了</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea name="notes" class="form-control"></textarea>
    </div>
    <div class="flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">登録する</button>
      <a href="{{ url_for('breeder.heats_list') }}" class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
