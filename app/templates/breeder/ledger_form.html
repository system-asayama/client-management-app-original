{% extends 'breeder/base.html' %}
{% block title %}台帳記録{% endblock %}
{% block topbar_title %}台帳に記録{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">台帳に記録</div>
  <a href="{{ url_for('breeder.ledger') }}" class="btn btn-secondary btn-sm">← 一覧に戻る</a>
</div>
<div class="card" style="max-width:600px;">
  <form method="post">
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">記録日 *</label>
        <input type="date" name="entry_date" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">種別 *</label>
        <select name="entry_type" class="form-control" required>
          <option value="birth">出生</option>
          <option value="death">死亡</option>
          <option value="transfer">譲渡</option>
          <option value="import">輸入</option>
          <option value="export">輸出</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">親犬</label>
        <select name="dog_id" class="form-control">
          <option value="">選択してください</option>
          {% for d in dogs %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">子犬</label>
        <select name="puppy_id" class="form-control">
          <option value="">選択してください</option>
          {% for p in puppies %}<option value="{{ p.id }}">{{ p.name or '（名前なし）' }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">内容</label>
        <input type="text" name="description" class="form-control">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea name="notes" class="form-control"></textarea>
    </div>
    <div class="flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">記録する</button>
      <a href="{{ url_for('breeder.ledger') }}" class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
