{% extends 'breeder/base.html' %}
{% block title %}飼い主新規登録{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">飼い主新規登録</h1>
    <p class="page-subtitle">飼い主情報を入力して招待URLを発行します</p>
  </div>
</div>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}
<div class="card" style="max-width:600px;">
  <form method="POST" action="/breeder/owners/new">
    <div class="form-group">
      <label class="form-label">飼い主名 <span style="color:red;">*</span></label>
      <input type="text" name="name" class="form-control" required placeholder="例: 山田 太郎">
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input type="email" name="email" class="form-control" placeholder="例: yamada@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">電話番号</label>
      <input type="tel" name="phone" class="form-control" placeholder="例: 090-1234-5678">
    </div>
    <hr style="margin:16px 0;">
    <div class="form-group">
      <label class="form-label">紐付ける犬</label>
      <select name="dog_id" class="form-control">
        <option value="">選択してください（後から追加も可）</option>
        {% for dog in dogs %}
        <option value="{{ dog.id }}">{{ dog.name }}（{{ dog.breed or '犬種不明' }}）</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">愛称・呼び名</label>
      <input type="text" name="nickname" class="form-control" placeholder="例: ポチ">
    </div>
    <div class="form-group">
      <label class="form-label">引渡し日</label>
      <input type="date" name="acquired_date" class="form-control">
    </div>
    <div class="form-group">
      <label class="form-label">備考</label>
      <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button type="submit" class="btn btn-primary">登録して招待URLを発行</button>
      <a href="/breeder/owners" class="btn btn-outline">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
