{% extends 'breeder/base.html' %}
{% block title %}Todo追加{% endblock %}
{% block topbar_title %}Todoを追加{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">Todoを追加</div>
  <a href="{{ url_for('breeder.todos_list') }}" class="btn btn-secondary btn-sm">← 一覧に戻る</a>
</div>
<div class="card" style="max-width:600px;">
  <form method="post">
    <div class="form-group">
      <label class="form-label">タイトル *</label>
      <input type="text" name="title" class="form-control" value="{{ todo.title if todo else '' }}" required>
    </div>
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">期限</label>
        <input type="date" name="due_date" class="form-control" value="{{ todo.due_date.strftime('%Y-%m-%d') if todo and todo.due_date else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select name="category" class="form-control">
          <option value="">選択してください</option>
          <option value="health">健康管理</option>
          <option value="breeding">繁殖</option>
          <option value="sales">販売</option>
          <option value="application">申請</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">関連する親犬</label>
        <select name="dog_id" class="form-control">
          <option value="">選択してください</option>
          {% for d in dogs %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">関連する子犬</label>
        <select name="puppy_id" class="form-control">
          <option value="">選択してください</option>
          {% for p in puppies %}<option value="{{ p.id }}">{{ p.name or '（名前なし）' }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">詳細</label>
      <textarea name="description" class="form-control">{{ todo.description if todo else '' }}</textarea>
    </div>
    <div class="flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">追加する</button>
      <a href="{{ url_for('breeder.todos_list') }}" class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
