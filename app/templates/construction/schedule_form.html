{% extends 'construction/base.html' %}
{% block title %}予定登録{% endblock %}
{% block topbar_title %}予定登録{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>予定登録</h1></div>
  <a href="{{ url_for('construction.schedules') }}" class="btn btn-ghost">← 一覧に戻る</a>
</div>
<div class="divider"></div>
<div class="card" style="max-width:640px">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ get_csrf() }}">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">タイトル *</label>
        <input class="form-control" type="text" name="title" required>
      </div>
      <div class="form-group">
        <label class="form-label">案件</label>
        <select class="form-control" name="anken_id">
          <option value="">— 選択 —</option>
          {% for p in projects %}
          <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">終日</label>
        <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.4rem">
          <input type="checkbox" name="all_day"> 終日予定にする
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">開始日時 *</label>
        <input class="form-control" type="datetime-local" name="start_at" required>
      </div>
      <div class="form-group">
        <label class="form-label">終了日時</label>
        <input class="form-control" type="datetime-local" name="end_at">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">詳細</label>
        <textarea class="form-control" name="description" rows="3"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
      <button type="submit" class="btn btn-primary">登録する</button>
      <a href="{{ url_for('construction.schedules') }}" class="btn btn-ghost">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
