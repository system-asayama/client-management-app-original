{% extends 'construction/base.html' %}
{% block title %}発注登録{% endblock %}
{% block topbar_title %}発注登録{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1>発注登録</h1>
  </div>
  <a href="{{ url_for('construction_ext.hacchu_list') }}" class="btn btn-ghost">← 一覧に戻る</a>
</div>
<div class="divider"></div>

<div class="card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">案件</label>
        <select name="anken_id" class="form-control">
          <option value="">— 選択 —</option>
          {% for p in projects %}<option value="{{ p.id }}" {% if hacchu and hacchu.anken_id == p.id %}selected{% endif %}>{{ p.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">仕入先</label>
        <select name="shiiresaki_id" class="form-control">
          <option value="">— 選択 —</option>
          {% for s in shiiresakis %}<option value="{{ s.id }}" {% if hacchu and hacchu.shiiresaki_id == s.id %}selected{% endif %}>{{ s.company_name }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">発注番号</label>
        <input type="text" name="order_no" class="form-control" value="{{ hacchu.order_no if hacchu else '' }}" placeholder="例：PO-2024-001">
      </div>
      <div class="form-group">
        <label class="form-label">発注日</label>
        <input type="date" name="order_date" class="form-control" value="{{ hacchu.order_date if hacchu else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">納期</label>
        <input type="date" name="delivery_date" class="form-control" value="{{ hacchu.delivery_date if hacchu else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select name="status" class="form-control">
          {% for k, v in status_labels.items() %}
          <option value="{{ k }}" {% if hacchu and hacchu.status == k %}selected{% endif %}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">合計金額</label>
        <input type="number" name="total_amount" class="form-control" value="{{ hacchu.total_amount if hacchu else '' }}" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">備考</label>
        <input type="text" name="notes" class="form-control" value="{{ hacchu.notes if hacchu else '' }}">
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
      <button type="submit" class="btn btn-primary">保存</button>
      <a href="{{ url_for('construction_ext.hacchu_list') }}" class="btn btn-ghost">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
