{% extends "base.html" %}
{% block title %}財務管理 - 準備中{% endblock %}
{% block header %}{% endblock %}
{% block content %}
<style>
  .coming-soon-wrap {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 1rem;
  }
  .coming-soon-icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    opacity: 0.6;
  }
  .coming-soon-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 0.75rem;
  }
  .coming-soon-desc {
    font-size: 1rem;
    color: #6b7280;
    max-width: 480px;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .coming-soon-badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fde68a;
    border-radius: 99px;
    padding: 0.4rem 1.2rem;
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 2.5rem;
  }
  .back-btn {
    display: inline-block;
    background: #1a3a5c;
    color: #fff;
    padding: 0.65rem 1.5rem;
    border-radius: 10px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: background 0.15s;
  }
  .back-btn:hover { background: #2563a8; }
</style>

<div class="coming-soon-wrap">
  <div class="coming-soon-icon">💰</div>
  <div class="coming-soon-badge">準備中</div>
  <div class="coming-soon-title">財務管理</div>
  <div class="coming-soon-desc">
    事務所の売上・経費・損益管理機能は現在開発中です。<br>
    近日中に公開予定です。
  </div>
  <a class="back-btn" href="{{ url_for('tenant_admin.dashboard') }}">← ダッシュボードへ戻る</a>
</div>
{% endblock %}
