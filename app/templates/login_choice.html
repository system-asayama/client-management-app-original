{% extends "base.html" %}
{% block title %}ログイン方法選択{% endblock %}
{% block content %}
<style>
  .login-page {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .login-header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    color: #fff;
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 860px;
    box-sizing: border-box;
    text-align: center;
  }
  .login-header .app-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  .login-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin: 0 0 0.4rem;
    color: #fff;
  }
  .login-header p {
    font-size: 0.95rem;
    opacity: 0.8;
    margin: 0;
  }
  .login-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 860px;
  }
  .login-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: var(--role-color, #2563a8);
  }
  .login-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(37,99,168,0.13);
    border-color: #93c5fd;
  }
  .login-card-icon {
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
  }
  .login-card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a3a5c;
  }
  .login-card-desc {
    font-size: 0.83rem;
    color: #6b7280;
    line-height: 1.5;
  }
  .login-card-arrow {
    margin-top: auto;
    font-size: 0.8rem;
    color: var(--role-color, #2563a8);
    font-weight: 600;
  }
  @media (max-width: 600px) {
    .login-grid { grid-template-columns: 1fr 1fr; }
    .login-header { padding: 1.75rem 1.25rem 1.5rem; }
    .login-header h1 { font-size: 1.4rem; }
  }
</style>

<div class="login-page">
  <div class="login-header">
    <div class="app-icon">🏢</div>
    <h1>ログイン方法を選択</h1>
    <p>ご自身のロールを選択してログインしてください</p>
  </div>

  <div class="login-grid">
    <a class="login-card" href="{{ url_for('auth.system_admin_login') }}" style="--role-color:#dc2626">
      <div class="login-card-icon">🔐</div>
      <div class="login-card-title">システム管理者</div>
      <div class="login-card-desc">全テナント横断の最高権限</div>
      <div class="login-card-arrow">ログイン →</div>
    </a>
    <a class="login-card" href="{{ url_for('app_manager.login') }}" style="--role-color:#7c3aed">
      <div class="login-card-icon">📦</div>
      <div class="login-card-title">アプリ管理者</div>
      <div class="login-card-desc">アプリ配布・管理グループの管理者</div>
      <div class="login-card-arrow">ログイン →</div>
    </a>
    <a class="login-card" href="{{ url_for('auth.tenant_admin_login') }}" style="--role-color:#2563a8">
      <div class="login-card-icon">🏛️</div>
      <div class="login-card-title">テナント管理者</div>
      <div class="login-card-desc">テナント単位の管理者</div>
      <div class="login-card-arrow">ログイン →</div>
    </a>
    <a class="login-card" href="{{ url_for('auth.admin_login') }}" style="--role-color:#059669">
      <div class="login-card-icon">🏪</div>
      <div class="login-card-title">管理者</div>
      <div class="login-card-desc">店舗・拠点などの管理者</div>
      <div class="login-card-arrow">ログイン →</div>
    </a>
    <a class="login-card" href="{{ url_for('auth.employee_login') }}" style="--role-color:#d97706">
      <div class="login-card-icon">👤</div>
      <div class="login-card-title">従業員</div>
      <div class="login-card-desc">一般従業員</div>
      <div class="login-card-arrow">ログイン →</div>
    </a>
  </div>
</div>
{% endblock %}
