{% extends "breeder/base.html" %}
{% block title %}健康記録 - {{ dog.name }}{% endblock %}
{% block content %}
<div class="form-container">
  <h2>📊 健康記録</h2>
  <p class="subtitle">{{ dog.nickname or dog.name }} の今日の健康状態を記録します</p>
  <form method="POST" action="{{ url_for('breeder.owner_health_log_create', owner_dog_id=owner_dog_id) }}">
    <input type="hidden" name="owner_dog_id" value="{{ owner_dog_id }}">
    <div class="form-group">
      <label>記録日</label>
      <input type="date" name="log_date" value="{{ today }}" required>
    </div>
    <div class="form-group">
      <label>体重 (kg)</label>
      <input type="number" name="weight" step="0.01" min="0" max="100" placeholder="例: 5.2">
    </div>
    <div class="form-group">
      <label>食欲</label>
      <div class="radio-group">
        <label class="radio-btn"><input type="radio" name="appetite" value="good"> 😋 よく食べた</label>
        <label class="radio-btn"><input type="radio" name="appetite" value="normal" checked> 😐 普通</label>
        <label class="radio-btn"><input type="radio" name="appetite" value="poor"> 😞 少なめ</label>
        <label class="radio-btn"><input type="radio" name="appetite" value="none"> 😰 食べなかった</label>
      </div>
    </div>
    <div class="form-group">
      <label>活動量</label>
      <div class="radio-group">
        <label class="radio-btn"><input type="radio" name="activity_level" value="high"> 🏃 活発</label>
        <label class="radio-btn"><input type="radio" name="activity_level" value="normal" checked> 🚶 普通</label>
        <label class="radio-btn"><input type="radio" name="activity_level" value="low"> 🐢 少なめ</label>
        <label class="radio-btn"><input type="radio" name="activity_level" value="very_low"> 😴 ほとんど動かない</label>
      </div>
    </div>
    <div class="form-group">
      <label>便の状態</label>
      <select name="stool_condition">
        <option value="">選択してください</option>
        <option value="normal">正常</option>
        <option value="soft">軟便</option>
        <option value="diarrhea">下痢</option>
        <option value="constipation">便秘</option>
        <option value="blood">血便</option>
      </select>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea name="notes" rows="3" placeholder="気になることがあれば..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-block">記録する</button>
    <a href="{{ url_for('breeder.owner_dashboard', owner_dog_id=owner_dog_id) }}" class="btn btn-outline btn-block">キャンセル</a>
  </form>
</div>
<style>
.form-container { max-width: 480px; margin: 0 auto; padding: 16px; }
.form-container h2 { font-size: 20px; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
.form-group input[type="date"], .form-group input[type="number"], .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box;
}
.radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
.radio-btn { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 13px; }
.radio-btn input { display: none; }
.radio-btn:has(input:checked) { background: #e8eaf6; border-color: #1a237e; color: #1a237e; }
.btn { padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; text-align: center; text-decoration: none; display: block; margin-bottom: 8px; }
.btn-primary { background: #1a237e; color: #fff; border: none; }
.btn-outline { background: #fff; color: #1a237e; border: 1px solid #1a237e; }
.btn-block { width: 100%; box-sizing: border-box; }
</style>
{% endblock %}
