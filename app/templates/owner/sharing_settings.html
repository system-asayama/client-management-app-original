<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --primary: #2563eb; --primary-dark: #1d4ed8; --bg: #f8fafc; --card: #fff;
    --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --success: #22c55e;
    --warning: #f59e0b; --danger: #ef4444; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--primary); color: #fff; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 17px; font-weight: 700; }
  .topbar a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: var(--card); border-radius: var(--radius); padding: 16px;
    margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .btn { display: inline-block; padding: 12px 20px; border-radius: 8px;
    font-size: 15px; font-weight: 600; text-decoration: none; border: none;
    cursor: pointer; text-align: center; width: 100%; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
  .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600;
    color: var(--muted); margin-bottom: 5px; }
  .form-control { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none; }
  .form-control:focus { border-color: var(--primary); }
  select.form-control { appearance: none; }
  .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
  .alert-success { background: #dcfce7; color: #166534; }
  .alert-error { background: #fee2e2; color: #991b1b; }
  .alert-info { background: #dbeafe; color: #1e40af; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px;
    font-size: 12px; font-weight: 600; }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-yellow { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-gray { background: #f1f5f9; color: #475569; }
  .dog-card { display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--card); border-radius: var(--radius); margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-decoration: none; color: inherit; }
  .dog-avatar { width: 52px; height: 52px; border-radius: 50%; background: #e0e7ff;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    flex-shrink: 0; }
  .dog-info { flex: 1; }
  .dog-name { font-size: 16px; font-weight: 700; }
  .dog-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: var(--card); border-radius: 10px; padding: 14px;
    text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .stat-num { font-size: 26px; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--muted);
    margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .list-item { display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .vaccine-item { display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); }
  .vaccine-item:last-child { border-bottom: none; }
  .chart-container { height: 180px; position: relative; }
</style>
<title>データ共有設定</title></head>
<body>
<div class="topbar">
  <a href="/owner/dog/{{ owner_dog.id }}" style="color:#fff; font-size:20px;">‹</a>
  <h1>データ共有設定</h1>
  <span></span>
</div>
<div class="container">
  <div class="card" style="margin-top:16px;">
    <div class="card-title">🔒 プライバシーポリシー</div>
    <p style="font-size:13px; color:var(--muted); line-height:1.6;">
      共有されたデータは、ブリーダーの繁殖改善のために統計的に利用されます。
      個人情報（氏名・連絡先）はブリーダーには提供されません。
      犬の健康データのみが匿名化されて共有されます。
    </p>
  </div>
  <form method="POST" action="/owner/dog/{{ owner_dog.id }}/sharing">
    <div class="card">
      <div class="form-group" style="margin-bottom:16px;">
        <label style="display:flex; align-items:flex-start; gap:12px; cursor:pointer;">
          <input type="checkbox" name="share_health_data" value="1"
            {{ 'checked' if owner_dog.share_health_data else '' }}
            style="width:20px; height:20px; margin-top:2px; flex-shrink:0;">
          <div>
            <div style="font-weight:700; font-size:15px;">健康ログを共有する</div>
            <div style="font-size:13px; color:var(--muted); margin-top:3px;">
              体重・食欲・活動量などの日常ログを共有します
            </div>
          </div>
        </label>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label style="display:flex; align-items:flex-start; gap:12px; cursor:pointer;">
          <input type="checkbox" name="share_followup_data" value="1"
            {{ 'checked' if owner_dog.share_followup_data else '' }}
            style="width:20px; height:20px; margin-top:2px; flex-shrink:0;">
          <div>
            <div style="font-weight:700; font-size:15px;">通院・医療記録を共有する</div>
            <div style="font-size:13px; color:var(--muted); margin-top:3px;">
              疾患・治療履歴を共有します（ブリーダーの遺伝病改善に役立てられます）
            </div>
          </div>
        </label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">設定を保存</button>
  </form>
</div>
</body></html>
