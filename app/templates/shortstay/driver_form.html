{% extends "shortstay/base.html" %}
{% block title %}{% if driver %}ドライバー編集{% else %}ドライバー追加{% endif %} - ショートステイ運営管理{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">👤 {% if driver %}ドライバー編集{% else %}ドライバー追加{% endif %}</h1>
  <a href="{{ url_for('shortstay.drivers') }}" class="btn">← 一覧に戻る</a>
</div>

<div class="card">
  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">氏名 <span style="color:var(--danger)">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ driver.name if driver else '' }}" required placeholder="例：田中 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">電話番号</label>
        <input type="tel" name="phone" class="form-control" value="{{ driver.phone if driver else '' }}" placeholder="例：090-1234-5678">
      </div>
    </div>
    <div class="form-section-title">免許情報</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">免許番号</label>
        <input type="text" name="license_number" class="form-control" value="{{ driver.license_number if driver else '' }}" placeholder="例：123456789012">
      </div>
      <div class="form-group">
        <label class="form-label">免許種別</label>
        <select name="license_type" class="form-control">
          <option value="">選択してください</option>
          <option value="普通自動車" {% if driver and driver.license_type == '普通自動車' %}selected{% endif %}>普通自動車</option>
          <option value="準中型" {% if driver and driver.license_type == '準中型' %}selected{% endif %}>準中型</option>
          <option value="中型" {% if driver and driver.license_type == '中型' %}selected{% endif %}>中型</option>
          <option value="大型" {% if driver and driver.license_type == '大型' %}selected{% endif %}>大型</option>
          <option value="普通二種" {% if driver and driver.license_type == '普通二種' %}selected{% endif %}>普通二種</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">免許有効期限</label>
        <input type="date" name="license_expiry" class="form-control" value="{{ driver.license_expiry.strftime('%Y-%m-%d') if driver and driver.license_expiry else '' }}">
      </div>
    </div>
    <div class="form-section-title">担当可能車両</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" name="can_drive_wheelchair_vehicle" value="1" {% if driver and driver.can_drive_wheelchair_vehicle %}checked{% endif %}>
          車椅子対応車両を運転可能
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">優先担当車両</label>
        <select name="preferred_vehicle_id" class="form-control">
          <option value="">指定なし</option>
          {% for v in vehicles %}
          <option value="{{ v.id }}" {% if driver and driver.preferred_vehicle_id == v.id %}selected{% endif %}>{{ v.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-section-title">その他</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea name="notes" class="form-control" rows="3">{{ driver.notes if driver else '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" name="is_active" value="1" {% if not driver or driver.is_active %}checked{% endif %}>
          稼働中
        </label>
      </div>
    </div>
    <div style="display:flex; gap:0.75rem; margin-top:1rem;">
      <button type="submit" class="btn btn-primary">💾 保存</button>
      <a href="{{ url_for('shortstay.drivers') }}" class="btn">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
