{% extends "shortstay/base.html" %}
{% block title %}報告書 - ショートステイ運営管理{% endblock %}
{% block topbar_title %}報告書{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">{{ '報告書編集' if report else '報告書作成' }}</div>
  <a href="{{ url_for('shortstay.reports') }}" class="btn">← 一覧へ戻る</a>
</div>

<form method="post">
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">利用者</label>
        <select name="resident_id" class="form-control">
          <option value="">選択してください（任意）</option>
          {% for r in residents %}
          <option value="{{ r.id }}" {% if report and report.resident_id == r.id %}selected{% endif %}>{{ r.last_name }}{{ r.first_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">報告書種別 <span style="color:red;">*</span></label>
        <select name="report_type" class="form-control" required>
          <option value="業務日誌" {% if not report or report.report_type == '業務日誌' %}selected{% endif %}>業務日誌</option>
          <option value="ケア報告書" {% if report and report.report_type == 'ケア報告書' %}selected{% endif %}>ケア報告書</option>
          <option value="サービス提供票" {% if report and report.report_type == 'サービス提供票' %}selected{% endif %}>サービス提供票</option>
          <option value="その他" {% if report and report.report_type == 'その他' %}selected{% endif %}>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">報告日 <span style="color:red;">*</span></label>
        <input type="date" name="report_date" class="form-control" required value="{{ report.report_date.isoformat() if report else today }}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input type="text" name="title" class="form-control" value="{{ report.title or '' if report else '' }}">
    </div>

    <div class="form-group">
      <label class="form-label">内容 <span style="color:red;">*</span></label>
      <textarea name="content" class="form-control" rows="12" required>{{ report.content if report else '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">作成者</label>
        <input type="text" name="author_name" class="form-control" value="{{ report.author_name or current_user_name if report else current_user_name }}">
      </div>
    </div>
  </div>

  <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
    <a href="{{ url_for('shortstay.reports') }}" class="btn">キャンセル</a>
    <button type="submit" class="btn btn-primary">{{ '更新する' if report else '作成する' }}</button>
  </div>
</form>
{% endblock %}
