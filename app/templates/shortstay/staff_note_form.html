{% extends "shortstay/base.html" %}
{% block title %}申し送り - ショートステイ運営管理{% endblock %}
{% block topbar_title %}申し送り{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">{{ '申し送り編集' if note else '申し送り追加' }}</div>
  <a href="{{ url_for('shortstay.staff_notes') }}" class="btn">← 一覧へ戻る</a>
</div>

<form method="post">
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">日付 <span style="color:red;">*</span></label>
        <input type="date" name="note_date" class="form-control" required value="{{ note.note_date.isoformat() if note else today }}">
      </div>
      <div class="form-group">
        <label class="form-label">優先度</label>
        <select name="priority" class="form-control">
          <option value="通常" {% if not note or note.priority == '通常' %}selected{% endif %}>通常</option>
          <option value="重要" {% if note and note.priority == '重要' %}selected{% endif %}>重要</option>
          <option value="緊急" {% if note and note.priority == '緊急' %}selected{% endif %}>緊急</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">対象シフト</label>
        <select name="target_shift" class="form-control">
          <option value="">全シフト</option>
          <option value="日勤" {% if note and note.target_shift == '日勤' %}selected{% endif %}>日勤</option>
          <option value="夜勤" {% if note and note.target_shift == '夜勤' %}selected{% endif %}>夜勤</option>
          <option value="早番" {% if note and note.target_shift == '早番' %}selected{% endif %}>早番</option>
          <option value="遅番" {% if note and note.target_shift == '遅番' %}selected{% endif %}>遅番</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">内容 <span style="color:red;">*</span></label>
      <textarea name="content" class="form-control" rows="6" required>{{ note.content if note else '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">記載者</label>
        <input type="text" name="author_name" class="form-control" value="{{ note.author_name or current_user_name if note else current_user_name }}">
      </div>
    </div>
  </div>

  <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
    <a href="{{ url_for('shortstay.staff_notes') }}" class="btn">キャンセル</a>
    <button type="submit" class="btn btn-primary">{{ '更新する' if note else '追加する' }}</button>
  </div>
</form>
{% endblock %}
