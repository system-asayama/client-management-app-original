{% extends "shortstay/base.html" %}
{% block title %}バイタル記録 - ショートステイ運営管理{% endblock %}
{% block topbar_title %}バイタル記録{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">{{ 'バイタル編集' if vital else 'バイタル記録' }}</div>
  <a href="{{ url_for('shortstay.care_records') }}" class="btn">← 記録一覧へ</a>
</div>

<form method="post">
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">利用者 <span style="color:red;">*</span></label>
        <select name="resident_id" class="form-control" required>
          <option value="">選択してください</option>
          {% for r in residents %}
          <option value="{{ r.id }}" {% if (vital and vital.resident_id == r.id) or (prefill_resident and prefill_resident|int == r.id) %}selected{% endif %}>
            {{ r.last_name }}{{ r.first_name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">記録日 <span style="color:red;">*</span></label>
        <input type="date" name="record_date" class="form-control" required value="{{ vital.record_date.isoformat() if vital else today }}">
      </div>
      <div class="form-group">
        <label class="form-label">記録時刻</label>
        <input type="time" name="record_time" class="form-control" value="{{ vital.record_time or '' if vital else '' }}">
      </div>
    </div>

    <div class="form-section-title">バイタルサイン</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">体温（℃）</label>
        <input type="number" name="body_temp" class="form-control" step="0.1" min="30" max="45" placeholder="36.5" value="{{ vital.body_temp or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">血圧 収縮期（mmHg）</label>
        <input type="number" name="blood_pressure_high" class="form-control" min="0" max="300" placeholder="120" value="{{ vital.blood_pressure_high or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">血圧 拡張期（mmHg）</label>
        <input type="number" name="blood_pressure_low" class="form-control" min="0" max="200" placeholder="80" value="{{ vital.blood_pressure_low or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">脈拍（回/分）</label>
        <input type="number" name="pulse" class="form-control" min="0" max="300" placeholder="70" value="{{ vital.pulse or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">SpO2（%）</label>
        <input type="number" name="spo2" class="form-control" min="0" max="100" placeholder="98" value="{{ vital.spo2 or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">体重（kg）</label>
        <input type="number" name="weight" class="form-control" step="0.1" min="0" max="200" placeholder="55.0" value="{{ vital.weight or '' if vital else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">呼吸数（回/分）</label>
        <input type="number" name="respiration" class="form-control" min="0" max="100" placeholder="18" value="{{ vital.respiration or '' if vital else '' }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">記録者</label>
        <input type="text" name="recorded_by" class="form-control" value="{{ vital.recorded_by or current_user_name if vital else current_user_name }}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">特記事項</label>
      <textarea name="notes" class="form-control" rows="3">{{ vital.notes or '' if vital else '' }}</textarea>
    </div>
  </div>

  <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
    <a href="{{ url_for('shortstay.care_records') }}" class="btn">キャンセル</a>
    <button type="submit" class="btn btn-primary">{{ '更新する' if vital else '記録する' }}</button>
  </div>
</form>
{% endblock %}
