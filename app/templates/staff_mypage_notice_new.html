{% extends "staff_mypage_base.html" %}
{% block page_title %}お知らせ投稿{% endblock %}
{% block topbar_title %}お知らせ新規投稿{% endblock %}

{% block content %}
<div style="margin-bottom:16px;">
    <a href="{{ url_for('staff_mypage.notices') }}" class="btn btn-secondary" style="font-size:12px;">← 一覧に戻る</a>
</div>

<div class="card" style="max-width:700px;">
    <div class="card-title">📢 お知らせを投稿する</div>
    <form method="post">
        <div class="form-group">
            <label>タイトル <span style="color:#e53935;">*</span></label>
            <input type="text" name="title" required placeholder="お知らせのタイトルを入力してください">
        </div>
        <div class="form-group">
            <label>本文</label>
            <textarea name="body" rows="8" placeholder="お知らせの内容を入力してください"
                      style="resize:vertical;"></textarea>
        </div>
        <div class="form-group" style="display:flex; align-items:center; gap:10px;">
            <input type="checkbox" name="is_important" id="isImportant" style="width:auto;">
            <label for="isImportant" style="margin:0; cursor:pointer; font-weight:600; color:#c62828;">
                🔴 重要なお知らせとして投稿する
            </label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">投稿する</button>
            <a href="{{ url_for('staff_mypage.notices') }}" class="btn btn-secondary">キャンセル</a>
        </div>
    </form>
</div>
{% endblock %}
