<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>アンケートご回答ありがとうございます</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 48px 36px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 12px; }
    p { color: #555; font-size: 16px; line-height: 1.6; margin-bottom: 8px; }
    .store-name { font-weight: 700; color: #1a1a2e; font-size: 18px; margin-bottom: 24px; }
    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 24px 0; }
    .close-hint { color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🙏</div>
    <h1>ありがとうございました！</h1>
    {% if store_name %}
    <p class="store-name">{{ store_name }}</p>
    {% endif %}
    <p>アンケートにご協力いただき、<br>誠にありがとうございます。</p>
    <p>お客様のご意見を参考に、<br>より良いサービスを提供できるよう<br>努めてまいります。</p>
    <hr class="divider">
    <p class="close-hint">このページを閉じてください。</p>
  </div>
</body>
</html>
