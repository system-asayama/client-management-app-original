{% extends "base.html" %}
{% block title %}アプリ管理者グループ作成{% endblock %}
{% block content %}
<h1>アプリ管理者グループ作成</h1>

<div style="margin-bottom:20px">
  <a class="btn sub" href="{{ url_for('system_admin.app_manager_groups') }}">一覧に戻る</a>
</div>

<div class="card" style="max-width:700px">
  <form method="post">
    <div style="margin-bottom:20px">
      <label for="group_name" style="display:block;margin-bottom:8px;font-weight:bold">グループ名 <span style="color:red">*</span></label>
      <input 
        type="text" 
        id="group_name" 
        name="group_name" 
        required
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px"
        placeholder="例: 〇〇税理士事務所">
      <small style="color:#666">税理士事務所名など、グループを識別する名称を入力してください</small>
    </div>
    
    <div style="margin-bottom:20px">
      <label for="contact_email" style="display:block;margin-bottom:8px;font-weight:bold">連絡先メールアドレス</label>
      <input 
        type="email" 
        id="contact_email" 
        name="contact_email"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px"
        placeholder="contact@example.com">
    </div>
    
    <div style="margin-bottom:20px">
      <label for="contact_phone" style="display:block;margin-bottom:8px;font-weight:bold">連絡先電話番号</label>
      <input 
        type="tel" 
        id="contact_phone" 
        name="contact_phone"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px"
        placeholder="03-1234-5678">
    </div>
    
    <div style="margin-bottom:20px">
      <label for="description" style="display:block;margin-bottom:8px;font-weight:bold">説明</label>
      <textarea 
        id="description" 
        name="description"
        rows="4"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px"
        placeholder="グループの説明や特記事項を入力してください"></textarea>
    </div>
    
    <div style="display:flex;gap:10px;margin-top:30px">
      <button type="submit" class="btn">作成する</button>
      <a href="{{ url_for('system_admin.app_manager_groups') }}" class="btn" style="background:#999">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
