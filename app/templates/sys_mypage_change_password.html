{% extends "base.html" %}
{% block title %}パスワード変更{% endblock %}
{% block content %}
<h1>パスワード変更</h1>

<div class="card" style="max-width:640px">
  <form method="POST" action="{{ url_for('system_admin.change_password') }}">
    <div style="margin-bottom:15px">
      <label for="current_password" style="display:block; margin-bottom:5px">現在のパスワード <span style="color:red">*</span></label>
      <input type="password" id="current_password" name="current_password" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:3px">
    </div>
    
    <div style="margin-bottom:15px">
      <label for="new_password" style="display:block; margin-bottom:5px">新しいパスワード <span style="color:red">*</span></label>
      <input type="password" id="new_password" name="new_password" placeholder="8文字以上" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:3px">
      <small style="color:#666; display:block; margin-top:5px">※ 8文字以上で入力してください</small>
    </div>
    
    <div style="margin-bottom:15px">
      <label for="new_password_confirm" style="display:block; margin-bottom:5px">新しいパスワード（確認） <span style="color:red">*</span></label>
      <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="もう一度入力" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:3px">
    </div>
    
    <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap">
      <button type="submit" class="btn">変更</button>
      <a class="btn sub" href="{{ url_for('system_admin.mypage') }}">キャンセル</a>
    </div>
  </form>
</div>

{% if get_flashed_messages() %}
<div style="margin-top:20px">
  {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ category }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}
{% endblock %}
