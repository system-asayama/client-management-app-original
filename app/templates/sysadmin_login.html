{%- extends "base.html" -%}
{%- block title -%}システム管理者ログイン{%- endblock -%}
{%- block content -%}
<style>
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .login-box {
    width: 100%;
    max-width: 420px;
  }
  .login-card-header {
    background: linear-gradient(135deg, #1a3a5c 0%, #2563a8 100%);
    border-radius: 16px 16px 0 0;
    padding: 2rem 2rem 1.75rem;
    text-align: center;
    color: #fff;
    border-top: 5px solid #dc2626;
  }
  .login-card-header .role-icon {
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
  }
  .login-card-header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0;
    color: #fff;
  }
  .login-card-body {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 2rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .login-form-group {
    margin-bottom: 1.25rem;
  }
  .login-form-group label {
    display: block;
    margin-bottom: 0.4rem;
    font-weight: 600;
    font-size: 0.875rem;
    color: #374151;
  }
  .login-form-group input {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.95rem;
    box-sizing: border-box;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .login-form-group input:focus {
    outline: none;
    border-color: #dc2626;
    box-shadow: 0 0 0 3px #dc262622;
  }
  .login-error {
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.875rem;
    margin-bottom: 1rem;
  }
  .login-btn {
    width: 100%;
    background: #dc2626;
    color: #fff;
    border: none;
    padding: 0.75rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-bottom: 0.75rem;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-back {
    display: block;
    text-align: center;
    color: #6b7280;
    font-size: 0.875rem;
    text-decoration: none;
    padding: 0.5rem;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .login-back:hover { background: #f3f4f6; color: #374151; }
  .login-extra {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid #f3f4f6;
    font-size: 0.83rem;
    color: #9ca3af;
    text-align: center;
  }
  .login-extra a { color: #dc2626; text-decoration: none; }
  .login-extra a:hover { text-decoration: underline; }
</style>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-card-header">
      <div class="role-icon">🔐</div>
      <h1>システム管理者ログイン</h1>
    </div>
    <div class="login-card-body">
      {%- if error -%}
      <div class="login-error">{{ error }}</div>
      {%- endif -%}
      <form method="post" action="" autocomplete="off">
        <div class="login-form-group">
          <label for="login_id">ログインID</label>
          <input id="login_id" name="login_id" type="text" required autofocus placeholder="ログインIDを入力">
        </div>
        <div class="login-form-group">
          <label for="password">パスワード</label>
          <input id="password" name="password" type="password" required placeholder="パスワードを入力">
        </div>
        <button class="login-btn" type="submit">ログイン</button>
      </form>
      <a class="login-back" href="{{ url_for('auth.select_login') }}">← ログイン方法選択に戻る</a>
      
      <div class="login-extra">初回のみ <a href="{{ url_for('auth.first_admin_setup') }}">初期設定ページ</a> からシステム管理者を作成してください。</div>
    </div>
  </div>
</div>
{%- endblock -%}
