version: "3.9"

services:
  e-contract-api:
    build:
      context: ..
      dockerfile: e_contract_service/Dockerfile
    env_file:
      - .env
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: econtract
      POSTGRES_USER: econtract
      POSTGRES_PASSWORD: econtract
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U econtract -d econtract"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - econtract_pg_data:/var/lib/postgresql/data

volumes:
  econtract_pg_data:
