<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>電子契約一覧</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4">電子契約一覧</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="/tenant_admin/smtp_settings" title="署名依頼メールの送信設定">
        📧 メール送信設定
      </a>
      <a class="btn btn-primary" href="/e-contract/ui/contracts/create">新規作成</a>
    </div>
  </div>
  <div class="card">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead><tr><th>ID</th><th>タイトル</th><th>状態</th><th>作成日</th><th></th></tr></thead>
        <tbody>
        {% for c in contracts %}
          <tr>
            <td class="small">{{ c.id }}</td>
            <td>{{ c.title }}</td>
            <td><span class="badge text-bg-secondary">{{ c.status }}</span></td>
            <td>{{ c.created_at }}</td>
            <td><a class="btn btn-sm btn-outline-primary" href="/e-contract/ui/contracts/{{ c.id }}">詳細</a></td>
          </tr>
        {% else %}
          <tr><td colspan="5" class="text-center text-muted py-4">契約がありません</td></tr>
        {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
