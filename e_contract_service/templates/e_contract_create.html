<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>電子契約作成</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .upload-area {
      border: 2px dashed #dee2e6;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #0d6efd;
      background: #f0f6ff;
    }
    .upload-area .icon { font-size: 2.5rem; }
    #upload-progress { display: none; }
    #pdf-preview-wrap { display: none; }

    .signer-row {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      position: relative;
    }
    .signer-row .signer-num {
      font-size: .75rem;
      font-weight: 600;
      color: #6c757d;
      margin-bottom: 6px;
    }
    .signer-row .btn-remove {
      position: absolute;
      top: 10px;
      right: 10px;
    }
    .drag-handle {
      cursor: grab;
      color: #adb5bd;
      padding: 0 6px;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 860px;">
  <h1 class="h4 mb-3">電子契約作成</h1>
  <div class="card card-body">

    <!-- タイトル -->
    <div class="mb-3">
      <label class="form-label fw-semibold">契約タイトル <span class="text-danger">*</span></label>
      <input id="title" class="form-control" placeholder="例：業務委託基本契約書">
    </div>

    <!-- 契約書PDF -->
    <div class="mb-3">
      <label class="form-label fw-semibold">契約書PDF <span class="text-danger">*</span></label>

      <ul class="nav nav-tabs mb-2" id="docTab">
        <li class="nav-item">
          <button class="nav-link active" id="tab-upload" onclick="switchTab('upload')">📁 ファイルアップロード</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="tab-url" onclick="switchTab('url')">🔗 URLで指定</button>
        </li>
      </ul>

      <div id="panel-upload">
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('pdf-file-input').click()">
          <div class="icon">📄</div>
          <div class="mt-1 text-muted">クリックまたはドラッグ＆ドロップでPDFを選択</div>
          <div class="small text-muted">最大20MB・PDFのみ</div>
        </div>
        <input type="file" id="pdf-file-input" accept=".pdf,application/pdf" class="d-none">

        <div id="upload-progress" class="mt-2">
          <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%"></div>
          </div>
          <div class="small text-muted mt-1">アップロード中...</div>
        </div>

        <div id="pdf-preview-wrap" class="mt-2 p-2 border rounded bg-white d-flex align-items-center gap-2">
          <span class="text-success fs-5">✅</span>
          <div class="flex-grow-1">
            <div id="pdf-filename" class="fw-semibold small"></div>
            <div id="pdf-filesize" class="text-muted small"></div>
          </div>
          <button class="btn btn-sm btn-outline-danger" onclick="clearUpload()">削除</button>
        </div>
      </div>

      <div id="panel-url" class="d-none">
        <input id="document_url" class="form-control" placeholder="https://example.com/contract.pdf">
        <div class="form-text">公開アクセス可能なPDFのURLを入力してください。</div>
      </div>

      <input type="hidden" id="resolved_document_url">
    </div>

    <!-- 署名者 -->
    <div class="mb-3">
      <label class="form-label fw-semibold">署名者 <span class="text-danger">*</span></label>
      <div class="form-text mb-2">署名する順番に追加してください。複数の場合は上から順に署名依頼が届きます。</div>

      <div id="signers-list">
        <!-- 署名者行はJSで生成 -->
      </div>

      <button type="button" class="btn btn-outline-primary btn-sm mt-1" onclick="addSigner()">
        ＋ 署名者を追加
      </button>
    </div>

    <!-- 顔認証オプション -->
    <div class="mb-4 p-3 border rounded bg-white">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="require_face_auth" role="switch">
        <label class="form-check-label fw-semibold" for="require_face_auth">
          🔒 顔認証を要求する（本人確認オプション）
        </label>
      </div>
      <div id="face-auth-detail" class="mt-2 ms-4 text-muted small d-none">
        <p class="mb-1">有効にすると、署名者は以下の手順で本人確認を行います：</p>
        <ol class="mb-0">
          <li>身分証（免許証・マイナンバーカード等）の撮影</li>
          <li>ライブネスチェック（右向き → 左向き → 正面）でなりすまし防止</li>
          <li>身分証とセルフィーの顔照合（AI照合、類似度85%以上で通過）</li>
        </ol>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" id="btn-create" onclick="createContract()">作成</button>
      <a class="btn btn-outline-secondary" href="/e-contract/ui/contracts">戻る</a>
    </div>
    <div id="error-msg" class="mt-2 text-danger small"></div>
  </div>
</div>

<script>
/* ===================== タブ切替 ===================== */
let currentTab = 'upload';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panel-upload').classList.toggle('d-none', tab !== 'upload');
  document.getElementById('panel-url').classList.toggle('d-none', tab !== 'url');
  document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
  document.getElementById('tab-url').classList.toggle('active', tab === 'url');
  document.getElementById('resolved_document_url').value = '';
}

/* ===================== ドラッグ＆ドロップ ===================== */
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFileSelected(file);
});
document.getElementById('pdf-file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFileSelected(e.target.files[0]);
});

/* ===================== ファイルアップロード ===================== */
async function handleFileSelected(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showError('PDFファイルのみアップロードできます。'); return;
  }
  if (file.size > 20 * 1024 * 1024) {
    showError('ファイルサイズが20MBを超えています。'); return;
  }
  showError('');
  document.getElementById('upload-progress').style.display = 'block';
  document.getElementById('pdf-preview-wrap').style.display = 'none';

  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch('/e-contract/api/documents/upload', { method: 'POST', body: formData });
    const data = await res.json();
    document.getElementById('upload-progress').style.display = 'none';
    if (!res.ok) { showError('アップロードエラー: ' + (data.error || res.status)); return; }
    document.getElementById('resolved_document_url').value = data.document_url;
    document.getElementById('pdf-filename').textContent = data.filename;
    document.getElementById('pdf-filesize').textContent = formatSize(data.size);
    document.getElementById('pdf-preview-wrap').style.display = 'flex';
  } catch (err) {
    document.getElementById('upload-progress').style.display = 'none';
    showError('アップロード中にエラーが発生しました: ' + err.message);
  }
}

function clearUpload() {
  document.getElementById('resolved_document_url').value = '';
  document.getElementById('pdf-preview-wrap').style.display = 'none';
  document.getElementById('pdf-file-input').value = '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

/* ===================== 署名者フォーム ===================== */
let signerCount = 0;

function addSigner(name = '', email = '') {
  signerCount++;
  const idx = signerCount;
  const list = document.getElementById('signers-list');

  const row = document.createElement('div');
  row.className = 'signer-row';
  row.dataset.idx = idx;
  row.innerHTML = `
    <div class="signer-num">署名者 ${list.children.length + 1}</div>
    <button type="button" class="btn btn-sm btn-outline-danger btn-remove" onclick="removeSigner(this)" title="削除">✕</button>
    <div class="row g-2">
      <div class="col-12 col-sm-5">
        <input type="text" class="form-control form-control-sm signer-name"
               placeholder="氏名（例：山田 太郎）" value="${escHtml(name)}" required>
      </div>
      <div class="col-12 col-sm-7">
        <input type="email" class="form-control form-control-sm signer-email"
               placeholder="メールアドレス（例：yamada@example.com）" value="${escHtml(email)}" required>
      </div>
    </div>
  `;
  list.appendChild(row);
  renumberSigners();
}

function removeSigner(btn) {
  btn.closest('.signer-row').remove();
  renumberSigners();
}

function renumberSigners() {
  document.querySelectorAll('#signers-list .signer-row').forEach((row, i) => {
    row.querySelector('.signer-num').textContent = `署名者 ${i + 1}`;
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function collectSigners() {
  const rows = document.querySelectorAll('#signers-list .signer-row');
  const result = [];
  let valid = true;
  rows.forEach((row, i) => {
    const name = row.querySelector('.signer-name').value.trim();
    const email = row.querySelector('.signer-email').value.trim();
    if (!name || !email || !email.includes('@')) { valid = false; return; }
    result.push({ name, email, order_index: i + 1 });
  });
  return valid ? result : null;
}

// 初期状態：署名者1人を追加
addSigner();

/* ===================== 顔認証トグル ===================== */
document.getElementById('require_face_auth').addEventListener('change', function() {
  document.getElementById('face-auth-detail').classList.toggle('d-none', !this.checked);
});

/* ===================== エラー表示 ===================== */
function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

/* ===================== 契約作成 ===================== */
async function createContract() {
  showError('');

  const title = document.getElementById('title').value.trim();
  if (!title) { showError('契約タイトルを入力してください。'); return; }

  let documentUrl = '';
  if (currentTab === 'upload') {
    documentUrl = document.getElementById('resolved_document_url').value;
    if (!documentUrl) { showError('契約書PDFをアップロードしてください。'); return; }
  } else {
    documentUrl = document.getElementById('document_url').value.trim();
    if (!documentUrl) { showError('ドキュメントURLを入力してください。'); return; }
  }

  const signers = collectSigners();
  if (!signers) { showError('署名者の氏名・メールアドレスをすべて正しく入力してください。'); return; }
  if (signers.length === 0) { showError('署名者を1人以上追加してください。'); return; }

  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.textContent = '作成中...';

  const payload = {
    title,
    document_url: documentUrl,
    signers,
    require_face_auth: document.getElementById('require_face_auth').checked
  };

  try {
    const res = await fetch('/e-contract/api/contracts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok) {
      location.href = '/e-contract/ui/contracts/' + data.contract_id;
    } else {
      showError('作成エラー: ' + (data.error || JSON.stringify(data)));
      btn.disabled = false;
      btn.textContent = '作成';
    }
  } catch (err) {
    showError('通信エラー: ' + err.message);
    btn.disabled = false;
    btn.textContent = '作成';
  }
}
</script>
</body>
</html>
