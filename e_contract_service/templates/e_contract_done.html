<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>契約完了</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 760px;">
  <div class="card card-body text-center">
    <h1 class="h4 text-success">契約が確定しました</h1>
    <p>契約ID: {{ contract_id }}</p>
    <a class="btn btn-primary" href="/api/contracts/{{ contract_id }}/certificate">証明書情報を取得</a>
    <a class="btn btn-outline-secondary mt-2" href="/ui/contracts/{{ contract_id }}">契約詳細へ戻る</a>
  </div>
</div>
</body>
</html>
