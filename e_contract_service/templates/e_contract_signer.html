<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>署名ページ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:760px;">
  <h1 class="h4">署名者ページ</h1>
  <p class="text-muted">トークン: {{ token }}</p>
  <div class="d-flex gap-2 mb-3">
    <button class="btn btn-outline-primary" onclick="verify()">URL検証</button>
    <button class="btn btn-outline-warning" onclick="kyc()">KYC</button>
    <button class="btn btn-outline-info" onclick="consent()">同意</button>
    <button class="btn btn-success" onclick="sign()">署名</button>
  </div>
  <pre id="result" class="small"></pre>
</div>
<script>
const token = {{ token|tojson }};
async function req(path, body={}){
  const res = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data,null,2);
}
async function verify(){
  const res = await fetch(`/e-contract/api/sign/${token}`); const data = await res.json();
  document.getElementById('result').textContent = JSON.stringify(data,null,2);
}
async function kyc(){ await req(`/e-contract/api/sign/${token}/kyc`, {kyc_provider:'mock',kyc_session_id:'ui-session',result:'success'}); }
async function consent(){ await req(`/e-contract/api/sign/${token}/consent`, {agreed:true}); }
async function sign(){ await req(`/e-contract/api/sign/${token}/sign`, {}); }
</script>
</body>
</html>
